---
permalink: /writer/
title: "Studio Writer"
author_profile: false
layout: single
---

<link rel="stylesheet" href="https://unpkg.com/easymde/dist/easymde.min.css">
<script src="https://unpkg.com/easymde/dist/easymde.min.js"></script>

<style>
  .writer-container { max-width: 800px; margin: 0 auto; }
  .form-group { margin-bottom: 20px; }
  .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
  .form-group input[type="text"], .form-group input[type="password"] {
    width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit;
  }
  .settings-panel {
    background: #f9f9f9; border: 1px solid #eee; padding: 15px; border-radius: 6px; margin-bottom: 20px;
  }
  .btn-publish {
    background-color: #28a745; color: white; border: none; padding: 12px 24px;
    font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%;
  }
  .btn-publish:hover { background-color: #218838; }
  .btn-publish:disabled { background-color: #6c757d; cursor: not-allowed; }
  #status { margin-top: 15px; font-weight: bold; text-align: center; }
  .error { color: #dc3545; }
  .success { color: #28a745; }
  .loading { color: #007bff; }
</style>

<div class="writer-container">
  <div class="settings-panel">
    <h3>GitHub Setup</h3>
    <p style="font-size: 14px; margin-top: 0;">Your Personal Access Token (PAT) is saved locally in your browser. Needs `repo` scope.</p>
    <div class="form-group">
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
    </div>
  </div>

  <div class="form-group">
    <label for="post-title">Post Title</label>
    <input type="text" id="post-title" placeholder="A Catchy Title..." />
  </div>

  <div class="form-group">
    <label for="post-tags">Tags (comma separated)</label>
    <input type="text" id="post-tags" placeholder="android, AI, machine learning" />
  </div>

  <div class="form-group">
    <label for="post-excerpt">Excerpt (Short description)</label>
    <input type="text" id="post-excerpt" placeholder="A brief summary of the post for the blog list..." />
  </div>

  <div class="form-group">
    <label>Content</label>
    <textarea id="post-content"></textarea>
  </div>

  <button id="publish-btn" class="btn-publish">Publish to GitHub</button>
  <div id="status"></div>
</div>

<script>
  // Repo details
  const REPO_OWNER = 'Chhayansh-Git';
  const REPO_NAME = 'personal-website-portfolio';
  
  // Restore token
  const tokenInput = document.getElementById('gh-token');
  tokenInput.value = localStorage.getItem('gh_pat') || '';
  tokenInput.addEventListener('change', (e) => {
    localStorage.setItem('gh_pat', e.target.value);
  });

  // Initialize EasyMDE with custom image upload handler
  const easymde = new EasyMDE({
    element: document.getElementById('post-content'),
    spellChecker: false,
    uploadImage: true,
    imageAccept: "image/png, image/jpeg, image/gif, image/webp",
    imageUploadFunction: async (file, onSuccess, onError) => {
      const token = localStorage.getItem('gh_pat');
      if (!token) return onError("Please enter your GitHub Token first.");
      
      try {
        const ext = file.name.split('.').pop();
        const safeName = file.name.split('.')[0].replace(/[^a-z0-9]/gi, '-').toLowerCase();
        const filename = `${Date.now()}-${safeName}.${ext}`;
        const path = `images/${filename}`;
        
        // Convert to base64
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
          const base64Content = reader.result.split(',')[1];
          
          const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${path}`, {
            method: 'PUT',
            headers: {
              'Authorization': `token ${token}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              message: `Upload image: ${filename}`,
              content: base64Content
            })
          });
          
          if (!response.ok) {
            const err = await response.json();
            return onError(err.message || "Failed to upload image.");
          }
          
          // Image successfully uploaded to GitHub!
          onSuccess(`/images/${filename}`);
        };
      } catch (e) {
        onError(e.message);
      }
    }
  });

  // UTF-8 friendly base64 encoding
  function utf8_to_b64(str) {
    return window.btoa(unescape(encodeURIComponent(str)));
  }

  // Publish Handler
  document.getElementById('publish-btn').addEventListener('click', async () => {
    const token = document.getElementById('gh-token').value.trim();
    const title = document.getElementById('post-title').value.trim();
    const tags = document.getElementById('post-tags').value.split(',').map(t => t.trim()).filter(t => t);
    const excerpt = document.getElementById('post-excerpt').value.trim();
    const content = easymde.value();
    const statusEl = document.getElementById('status');

    if (!token) return alert("GitHub Token is required.");
    if (!title || !content) return alert("Title and Content are required.");

    const btn = document.getElementById('publish-btn');
    btn.disabled = true;
    btn.innerText = "Publishing...";
    statusEl.className = 'loading';
    statusEl.innerText = "Generating Markdown and pushing to GitHub...";

    try {
      // Format Date
      const dateObj = new Date();
      const yyyy = dateObj.getFullYear();
      const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
      const dd = String(dateObj.getDate()).padStart(2, '0');
      const dateStr = `${yyyy}-${mm}-${dd}`;
      
      // Generate Slug
      const slug = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
      const filename = `${dateStr}-${slug}.md`;
      const filePath = `_posts/${filename}`;

      // YAML Frontmatter
      const tagsFmt = tags.length > 0 ? `\ntags:\n${tags.map(t => `  - ${t}`).join('\n')}` : '';
      const frontmatter = `---
title: "${title.replace(/"/g, '\\"')}"
date: ${dateStr}
permalink: /posts/${yyyy}/${mm}/${slug}/
excerpt: "${excerpt.replace(/"/g, '\\"')}"${tagsFmt}
---

${content}`;

      // Push to GitHub via API
      const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${filePath}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: `Create new blog post: ${title}`,
          content: utf8_to_b64(frontmatter)
        })
      });

      if (!response.ok) {
        const errorData = await response.json();
        throw new Error(errorData.message || "Unknown GitHub API error.");
      }

      const resData = await response.json();
      statusEl.className = 'success';
      statusEl.innerHTML = `✅ Successfully published! <a href="${resData.content.html_url}" target="_blank">View on GitHub</a>`;
      
      // Clear form
      document.getElementById('post-title').value = '';
      document.getElementById('post-tags').value = '';
      document.getElementById('post-excerpt').value = '';
      easymde.value('');
      
    } catch (e) {
      statusEl.className = 'error';
      statusEl.innerText = `❌ Error: ${e.message}`;
    } finally {
      btn.disabled = false;
      btn.innerText = "Publish to GitHub";
    }
  });
</script>
